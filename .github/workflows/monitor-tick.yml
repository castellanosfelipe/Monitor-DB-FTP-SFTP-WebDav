# Dispara los chequeos del monitor desplegado en Vercel (modo serverless).
#
# El plan Hobby de Vercel limita sus crons a una vez al día, así que este
# workflow actúa de planificador externo: llama a /api/cron/tick cada 5
# minutos (mejor esfuerzo; GitHub puede retrasar schedules en horas pico).
# En Vercel Pro puedes cambiar el cron de vercel.json a "* * * * *" y
# desactivar este workflow.
#
# Requiere el secreto de repositorio CRON_SECRET (el mismo valor que la
# variable de entorno CRON_SECRET del proyecto en Vercel).

name: monitor-tick

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: monitor-tick
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Llamar /api/cron/tick
        run: |
          curl --fail-with-body -sS --max-time 90 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://stability-monitor-product15.vercel.app/api/cron/tick
